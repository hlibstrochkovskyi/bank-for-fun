name: ledger-bank

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ledgerbank}
      POSTGRES_USER: ${DB_USERNAME:-ledgerbank}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledgerbank}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ledgerbank} -d ${DB_NAME:-ledgerbank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8088}:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  core-bank:
    build:
      context: ./core-bank
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-ledgerbank}
      DB_USERNAME: ${DB_USERNAME:-ledgerbank}
      DB_PASSWORD: ${DB_PASSWORD:-ledgerbank}
      REDIS_HOST: redis
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/ledger-bank/protocol/openid-connect/certs
      # Fraud engine (Python), RabbitMQ, and dev SMTP (Mailhog).
      FRAUD_ENABLED: "true"
      FRAUD_BASE_URL: http://fraud-service:8000
      SPRING_RABBITMQ_HOST: rabbitmq
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      # Distributed tracing via the OpenTelemetry Java agent -> Tempo (OTLP/HTTP).
      # Metrics use Prometheus and logs use the console, so disable those exporters.
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: core-bank
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      # Emit structured (ECS) JSON logs so Loki/promtail can parse them.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      tempo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  fraud-service:
    build:
      context: ./fraud-service
    ports:
      - "${FRAUD_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # web UI

  # Optional DB UI: `docker compose --profile tools up pgadmin`
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ledgerbank.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # --- Observability (LGTM stack) ----------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./infra/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
      - "4318"        # OTLP HTTP (in-network)

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  pgdata:
  tempodata:
  lokidata:
