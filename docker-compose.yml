name: ledger-bank

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ledgerbank}
      POSTGRES_USER: ${DB_USERNAME:-ledgerbank}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledgerbank}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ledgerbank} -d ${DB_NAME:-ledgerbank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  core-bank:
    build:
      context: ./core-bank
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-ledgerbank}
      DB_USERNAME: ${DB_USERNAME:-ledgerbank}
      DB_PASSWORD: ${DB_PASSWORD:-ledgerbank}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Optional DB UI: `docker compose --profile tools up pgadmin`
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ledgerbank.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
