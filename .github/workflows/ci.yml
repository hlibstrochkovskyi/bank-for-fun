name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-bank:
    name: core-bank · build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-bank
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` compiles, runs Checkstyle/etc. (when added) and the test suite.
      # Testcontainers uses the Docker daemon available on ubuntu-latest runners.
      - name: Build & test
        run: ./gradlew build --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-bank-test-report
          path: core-bank/build/reports/tests/test
          if-no-files-found: ignore

  fraud-service:
    name: fraud-service · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fraud-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Test
        run: uv run --frozen pytest -q
