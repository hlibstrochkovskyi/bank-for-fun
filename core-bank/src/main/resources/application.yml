spring:
  application:
    name: core-bank

  # Twelve-factor: all config comes from the environment, with sane local defaults.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ledgerbank}
    username: ${DB_USERNAME:ledgerbank}
    password: ${DB_PASSWORD:ledgerbank}

  jpa:
    # Flyway owns DDL. Hibernate only validates that entities match the migrated schema.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Project Loom: blocking + virtual threads scales the simple servlet stack.
  threads:
    virtual:
      enabled: true

  # OAuth2 resource server: validate JWTs issued by Keycloak (ADR-0006). jwk-set-uri
  # is fetched lazily on first token validation, so startup does not depend on
  # Keycloak being up. Tests use mock JWTs and never hit this.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8088/realms/ledger-bank/protocol/openid-connect/certs}

  # RFC 7807 application/problem+json error responses.
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: "ledger-bank :: core-bank"
    description: Simulated retail bank on an immutable double-entry ledger

ledgerbank:
  scheduler:
    enabled: true
    standing-orders:
      fixed-delay: 60000   # ms between standing-order sweeps
  rate-limit:
    buckets:
      money:
        limit: 30          # requests
        window-seconds: 60 # per rolling window, per user
